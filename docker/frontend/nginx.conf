# ══════════════════════════════════════════════════════════════
# Nginx config — serve React SPA + support client-side routing
# ══════════════════════════════════════════════════════════════
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # SPA fallback — semua route balik ke index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache aset statis (hash-based, aman cache panjang)
    location ~* \.(js|css|woff2?|eot|ttf|otf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Jangan cache index.html (supaya update ke-deploy langsung ketangkap)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
